name: Refresh THB Newsletter

permissions:
  contents: write

concurrency:
  group: thb-newsletter-refresh
  cancel-in-progress: true

on:
  workflow_dispatch:
  schedule:
    - cron: "30 4 * * 0-6"
    - cron: "30 13 * * 0-6"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      TZ: Asia/Kolkata
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate newsletter data
        run: |
          mkdir -p artifacts
          node ./scripts/generate-newsletter.mjs | tee artifacts/generate-newsletter.json

      - name: Export newsletter site data
        run: node ./scripts/export-site-data.mjs

      - name: Verify generated output
        run: node ./scripts/verify-output.mjs | tee artifacts/verify-output.log

      - name: Build static site
        run: node ./scripts/build-static-site.mjs

      - name: Summarize refresh output
        if: always()
        run: node ./scripts/write-refresh-summary.mjs

      - name: Commit newsletter refresh changes
        id: commit_refresh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ newsletter/issues/ data/site-manifest.json

          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No newsletter content changes to commit."
            exit 0
          fi

          issue_key=$(node -e "const fs=require('fs'); const index=JSON.parse(fs.readFileSync('data/issues/index.json','utf8')); console.log(index.latestIssueKey || 'newsletter');")
          git commit -m "Auto-refresh newsletter for ${issue_key}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Upload refresh artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newsletter-refresh-${{ github.run_number }}
          path: |
            artifacts/*
            data/site-manifest.json
            data/issues/index.json
            data/issues/*.json
            newsletter/issues/*.md
          if-no-files-found: warn
          retention-days: 14

      - name: Verify Cloudflare secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || (echo "::error::Missing CLOUDFLARE_API_TOKEN secret" && exit 1)
          test -n "$CLOUDFLARE_ACCOUNT_ID" || (echo "::error::Missing CLOUDFLARE_ACCOUNT_ID secret" && exit 1)

      - name: Deploy to Cloudflare Pages
        if: steps.commit_refresh.outputs.has_changes == 'true' || github.event_name == 'workflow_dispatch'
        run: npx wrangler pages deploy dist --project-name thb-weekly-newsletter --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
